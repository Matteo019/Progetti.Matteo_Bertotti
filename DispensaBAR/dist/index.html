<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispensa Bar — Accedi</title>
  <meta name="description" content="Accedi al sistema di gestione inventario Dispensa Bar" />
  <script type="module" crossorigin src="/assets/supabase-config-Cx9GDPIQ.js"></script>
  <script type="module" crossorigin src="/assets/auth-BoJBCNKn.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/auth-C1Dag3UN.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card glass-card glass-card--glow">
      <div class="auth-card__logo">
        <span class="auth-card__logo-icon">🥃</span>
        <h1 class="auth-card__logo-title">Dispensa Bar</h1>
        <p class="auth-card__logo-sub">Gestione Inventario</p>
      </div>

      <div id="auth-message" class="auth-message"></div>

      <form id="login-form" class="auth-form" autocomplete="on">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="nome@esempio.com"
            required
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit" id="login-btn" class="btn btn--primary btn--full btn--lg">
          Accedi
        </button>
      </form>

      <div class="auth-links">
        <a href="/recovery.html">Password dimenticata?</a>
        <a href="/signup.html">Non hai un account? <strong>Registrati</strong></a>
      </div>
    </div>
  </main>

</body>
</html>
